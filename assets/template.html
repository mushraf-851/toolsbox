<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✏️ CHANGE THESE FOR EACH TOOL -->
  <title>Tool Name — One-line description | ToolsBox</title>
  <meta name="description" content="Free online [tool name]. [What it does in 1 sentence]. No sign-up required — works instantly.">
  <link rel="canonical" href="https://yourdomain.com/calculators/tool-slug.html">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:title"       content="Tool Name — ToolsBox">
  <meta property="og:description" content="Free online tool. Works instantly.">
  <meta property="og:url"         content="https://yourdomain.com/calculators/tool-slug.html">
  <meta property="og:type"        content="website">

  <!-- JSON-LD Structured Data (helps Google show rich results) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Tool Name",
    "url": "https://yourdomain.com/calculators/tool-slug.html",
    "description": "Free online tool name. What it does.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <!-- Shared stylesheet — path depends on folder depth -->
  <!-- From calculators/ or text-tools/ folders: -->
  <link rel="stylesheet" href="../assets/style.css">
  <!-- From root index.html use: -->
  <!-- <link rel="stylesheet" href="assets/style.css"> -->
</head>
<body>

  <!-- ✅ Nav is injected here automatically by common.js -->

  <!-- window.TB must be set BEFORE common.js loads -->
  <script>
    window.TB = {
      category: 'calculators',     // 'calculators' | 'text-tools' | 'home'
      tool:     'Tool Name',        // Shown in breadcrumb
      toolSlug: 'tool-slug',        // Your HTML filename without .html
      accent:   'yellow',           // 'yellow' for calculators, 'blue' for text tools
    };
  </script>

  <!-- ─────────────────────────────────────────────── -->
  <!--   MAIN CONTENT — Edit everything below here    -->
  <!-- ─────────────────────────────────────────────── -->

  <main class="tb-main">

    <!-- Breadcrumb (auto-generated by common.js if you add id="tb-breadcrumb") -->
    <nav class="tb-breadcrumb" aria-label="Breadcrumb">
      <a href="../index.html">Home</a>
      <span class="sep">›</span>
      <a href="index.html">Calculators</a>
      <span class="sep">›</span>
      <span class="current">Tool Name</span>
    </nav>

    <!-- Page Header -->
    <header class="tb-page-header">
      <div class="tb-badge">🧮 Calculator Tool</div>
      <h1 class="tb-page-title">Your <em>Tool</em> Name</h1>
      <p class="tb-page-subtitle">
        One sentence describing what this tool does and who it helps.
      </p>
    </header>

    <!-- Main Tool Card -->
    <div class="tb-card">

      <!-- Input fields -->
      <div class="tb-row col2">
        <div class="tb-field">
          <label class="tb-label" for="input1">Label One</label>
          <input class="tb-input" type="number" id="input1" placeholder="Enter value">
        </div>
        <div class="tb-field">
          <label class="tb-label" for="input2">Label Two</label>
          <input class="tb-input" type="number" id="input2" placeholder="Enter value">
        </div>
      </div>

      <!-- Error message (hidden by default) -->
      <div class="tb-error" id="error">Please fill in all fields correctly.</div>

      <!-- Action buttons -->
      <div class="tb-btn-row">
        <button class="tb-btn primary" onclick="calculate()">Calculate →</button>
        <button class="tb-btn secondary" onclick="reset()">Reset</button>
      </div>

      <!-- Result (hidden until calculated) -->
      <div class="tb-result" id="result">

        <!-- Main big result -->
        <div class="tb-result-hero">
          <span class="tb-result-big" id="res-main">--</span>
          <span class="tb-result-label">unit label</span>
          <div class="tb-result-sub" id="res-sub"></div>
        </div>

        <!-- Stats grid -->
        <div class="tb-stats col3">
          <div class="tb-stat">
            <span class="tb-stat-val" id="stat1">--</span>
            <span class="tb-stat-key">Stat One</span>
          </div>
          <div class="tb-stat">
            <span class="tb-stat-val" id="stat2">--</span>
            <span class="tb-stat-key">Stat Two</span>
          </div>
          <div class="tb-stat">
            <span class="tb-stat-val" id="stat3">--</span>
            <span class="tb-stat-key">Stat Three</span>
          </div>
        </div>

        <!-- Copy result button (data-copy="elementId") -->
        <button class="tb-btn ghost sm mt-12" data-copy="res-main">📋 Copy Result</button>

      </div>
    </div>

    <!-- Related Tools (auto-populated by TB_UTILS.renderRelated) -->
    <div class="tb-related">
      <div class="tb-related-title">🔗 Related tools</div>
      <div class="tb-related-grid" id="related-tools">
        <!-- Populated by JS below -->
      </div>
    </div>

  </main>

  <!-- ✅ Footer is injected automatically by common.js -->

  <!-- Shared JS — always last -->
  <!-- From calculators/ or text-tools/ folders: -->
  <script src="../assets/common.js"></script>
  <!-- From root: <script src="assets/common.js"></script> -->

  <!-- Tool-specific logic -->
  <script>
    // Populate related tools
    TB_UTILS.renderRelated('related-tools', 'tool-slug', 'calculators');

    function calculate() {
      const v1 = parseFloat(document.getElementById('input1').value);
      const v2 = parseFloat(document.getElementById('input2').value);

      // Validate
      if (!TB_UTILS.isPosNum(v1) || !TB_UTILS.isPosNum(v2)) {
        TB_UTILS.showError('error', 'Please enter valid positive numbers.');
        return;
      }
      TB_UTILS.hideError('error');

      // ─── YOUR CALCULATION LOGIC HERE ───
      const mainResult = v1 + v2; // replace with your formula
      const stat1val   = v1 * 2;
      const stat2val   = v2 * 2;
      const stat3val   = mainResult * 2;
      // ────────────────────────────────────

      // Update UI
      document.getElementById('res-main').textContent = TB_UTILS.fmtComma(mainResult);
      document.getElementById('res-sub').textContent  = `Based on inputs: ${v1} and ${v2}`;
      document.getElementById('stat1').textContent    = TB_UTILS.fmtComma(stat1val);
      document.getElementById('stat2').textContent    = TB_UTILS.fmtComma(stat2val);
      document.getElementById('stat3').textContent    = TB_UTILS.fmtComma(stat3val);

      TB_UTILS.showResult('result');
    }

    function reset() {
      document.getElementById('input1').value = '';
      document.getElementById('input2').value = '';
      TB_UTILS.hideResult('result');
      TB_UTILS.hideError('error');
    }

    // Allow Enter key to calculate
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') calculate();
    });
  </script>

</body>
</html>
